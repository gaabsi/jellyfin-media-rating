name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Prepare release assets
        id: assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.0000000Z")
          DLL="bin/Release/net8.0/Jellyfin.Plugin.Rating.dll"
          CHECKSUM=$(md5sum $DLL | awk '{print $1}')

          # Génère le meta.json avec le bon nom d'assemblée
          cat > meta.json << EOF
          {
            "category": "General",
            "changelog": "Release ${GITHUB_REF_NAME}",
            "description": "Netflix-like rating UI for Jellyfin. Rate your media with a simple thumbs system.",
            "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
            "name": "Media Rating",
            "overview": "Rate movies and shows with 3 levels : dislike, like, love — directly from the detail page.",
            "owner": "gaabsi",
            "targetAbi": "10.11.0.0",
            "timestamp": "${TIMESTAMP}",
            "version": "${VERSION}",
            "status": "Active",
            "autoUpdate": false,
            "imagePath": "",
            "assemblies": ["Jellyfin.Plugin.Rating.dll"]
          }
          EOF

          # Crée le ZIP avec DLL + meta.json
          ZIP="media-rating_${VERSION}.zip"
          zip -j $ZIP $DLL meta.json
          echo "zip=$ZIP" >> $GITHUB_OUTPUT
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.assets.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.assets.outputs.version }}"
          TIMESTAMP="${{ steps.assets.outputs.timestamp }}"
          ZIP="${{ steps.assets.outputs.zip }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${ZIP}"
          CHECKSUM="${{ steps.assets.outputs.checksum }}"

          python3 - <<EOF
          import json

          with open("manifest.json") as f:
              manifest = json.load(f)

          new_version = {
              "version": "${VERSION}",
              "changelog": "Release ${GITHUB_REF_NAME}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": "${SOURCE_URL}",
              "checksum": "${CHECKSUM}",
              "timestamp": "${TIMESTAMP}"
          }

          manifest[0]["versions"].insert(0, new_version)

          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          EOF

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "release: update manifest for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
